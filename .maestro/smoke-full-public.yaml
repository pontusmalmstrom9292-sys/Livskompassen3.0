# Maestro — full public crawl on G85 via drawer (no Valv PIN / no long-press).
appId: com.livskompassen.app
---
- launchApp:
    clearState: false
- waitForAnimationToEnd:
    timeout: 8000

# Open menu
- tapOn:
    text: ".*"
    index: 0
    optional: true
- tapOn:
    id: ".*"
    optional: true

# Try hamburger via common a11y
- tapOn:
    text: "Öppna meny"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

