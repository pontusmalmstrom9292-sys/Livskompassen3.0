# Maestro — launch + short dock taps on G85. Never long-press Hamn (Valv).
appId: com.livskompassen.app
---
- launchApp:
    clearState: false
- waitForAnimationToEnd:
    timeout: 8000
- assertVisible:
    text: ".*[Ll]ivskompassen.*|.*[Aa]nteckning.*|.*[Ff]amilj.*"
    optional: true
# Dock labels (BastaDesign v2)
- tapOn:
    text: "Familj"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Ventil"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Inkast"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Anteckning"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
# Short compass tap via approximate center-bottom (G85 1080-ish) — NOT pressAndHold
- tapOn:
    point: "50%,92%"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
