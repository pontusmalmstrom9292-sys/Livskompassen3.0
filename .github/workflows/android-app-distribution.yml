# Optional: build debug APK + Firebase App Distribution (family install without Play Store).
# Setup: docs/CI-ANDROID-DISTRIBUTION.md

name: Android App Distribution

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "android/**"
      - "capacitor.config.ts"
      - "package.json"
      - ".github/workflows/android-app-distribution.yml"

concurrency:
  group: android-app-distribution
  cancel-in-progress: true

jobs:
  build_and_distribute:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Capacitor sync (prod Hosting URL)
        run: npm run cap:sync:prod
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Assemble debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: livskompassen-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      # Secrets are not allowed in `if:` — detect via step output.
      - name: Detect App Distribution testers
        id: app_dist
        env:
          TESTERS: ${{ secrets.FIREBASE_APP_DISTRIBUTION_TESTERS }}
        run: |
          if [ -n "$TESTERS" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Distribute to Firebase App Distribution
        if: steps.app_dist.outputs.enabled == 'true'
        env:
          TESTERS: ${{ secrets.FIREBASE_APP_DISTRIBUTION_TESTERS }}
        run: |
          npx firebase-tools@13.35.1 appdistribution:distribute \
            android/app/build/outputs/apk/debug/app-debug.apk \
            --app "1:1084026575972:android:a64e211553821b3fdbd371" \
            --project gen-lang-client-0481875058 \
            --testers "$TESTERS" \
            --non-interactive
