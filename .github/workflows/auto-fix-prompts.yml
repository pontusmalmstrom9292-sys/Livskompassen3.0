name: Auto-fix prompt mirrors

on:
  pull_request:
    paths:
      - 'docs/prompts/**'
      - 'functions/src/sharedRules.ts'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          # Same-repo PR branches need write token to push sync commits.
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - run: npm run prompts:sync
      - name: Commit synced mirrors if dirty
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/prompts/
          if git diff --cached --quiet; then
            echo "Already in sync — nothing to commit"
            exit 0
          fi
          git commit -m "chore(prompts): auto-sync mirrors from sharedRules"
          git push origin "HEAD:${{ github.head_ref }}"
