# Säkerhetsnät · Lås 2 — Auto-merge för Dependabot patch-PR:er.
# Krav: PR smoke gate (pr-smoke-gate.yml) måste vara grön innan merge.
# Major-versioner mergas ALDRIG automatiskt. Minor mergas endast för
# dev-beroenden. Se docs/SAKERHETSNAT.md.

name: Dependabot auto-merge

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Hämta Dependabot-metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Aktivera auto-merge för patch-versioner
        if: steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Aktivera auto-merge för minor på dev-beroenden
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-minor' &&
          steps.meta.outputs.dependency-type == 'direct:development'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lämna kommentar för major-versioner (manuell granskning krävs)
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr comment "$PR_URL" --body "⚠️ Major-version upptäckt — säkerhetsnätet stoppar auto-merge. Pontus måste granska och merga manuellt. Se docs/SAKERHETSNAT.md."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
