# Deploy Firebase Hosting when code is pushed to main (Livskompassen3.0).
# Setup once: docs/CI-HOSTING.md

name: Deploy Hosting (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-hosting-main
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build functions
        run: cd functions && npm ci && npm run build

      - name: Smoke locked UX + AUTH-G1
        run: npm run smoke:locked-ux

      - name: Build frontend
        run: npm run build
        env:
          # AUTH-G1: authDomain ska vara *.firebaseapp.com — lägg ALDRIG VITE_GOOGLE_SIGNIN_REDIRECT här.
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@13.35.1 deploy --only hosting --project gen-lang-client-0481875058 --non-interactive
