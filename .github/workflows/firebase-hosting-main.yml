# Deploy Firebase Hosting (Livskompassen3.0).
# PAUSAD: auto-deploy på push till main är av — kör manuellt via Actions → workflow_dispatch.
# Återaktivera: avkommentera push-blocket nedan.
#
# Säkerhetsnät · Lås 3 — Pontus måste kryssa i "Jag har läst PR-checklistan"
# innan deploy startas. Detta är en mjuk men obligatorisk gate som hindrar
# oavsiktliga prod-pushar. Se docs/SAKERHETSNAT.md.

name: Deploy Hosting (main)

on:
  # push:
  #   branches:
  #     - main
  workflow_dispatch:
    inputs:
      pr_checklist_confirmed:
        description: "Jag har läst PR-checklistan och smoke-rapporten (kryssa = JA)"
        type: boolean
        required: true
        default: false
      deploy_note:
        description: "Kort anteckning (vad och varför) — syns i körningens loggar"
        type: string
        required: true
        default: "Manuell deploy efter smoke PASS"

concurrency:
  group: firebase-hosting-main
  cancel-in-progress: true

jobs:
  guard:
    name: Säkerhetsnät · checklist-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verifiera kryssruta
        env:
          # Skicka som env-variabler för att förhindra GitHub Actions
          # script-injection via free-text inputs. Se docs/SAKERHETSNAT.md.
          CHECKLIST_CONFIRMED: ${{ inputs.pr_checklist_confirmed }}
          DEPLOY_NOTE: ${{ inputs.deploy_note }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ "$CHECKLIST_CONFIRMED" != "true" ]; then
            echo "::error title=Säkerhetsnät · Lås 3::Kryssrutan 'Jag har läst PR-checklistan' är inte ikryssad. Deploy avbruten."
            echo ""
            echo "Åtgärd: kör om workflow_dispatch och kryssa i rutan."
            echo "Läs docs/SAKERHETSNAT.md innan du kryssar."
            exit 1
          fi
          echo "Checklist bekräftad av $ACTOR: $DEPLOY_NOTE"

  build_and_deploy:
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build functions
        run: cd functions && npm install && npm run build

      - name: Smoke pre-deploy gate (YOLO static)
        run: npm run smoke:predeploy

      - name: Typecheck core strict
        run: npm run typecheck:core-strict

      - name: Build frontend
        run: npm run build
        env:
          # AUTH-G1: authDomain ska vara *.firebaseapp.com — lägg ALDRIG VITE_GOOGLE_SIGNIN_REDIRECT här.
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          # Krävs när functions APP_CHECK_ENFORCE=true (Valv unlock, inkast, …)
          VITE_APP_CHECK_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_APP_CHECK_RECAPTCHA_SITE_KEY }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@13.35.1 deploy --only hosting,functions,firestore:rules,storage --project gen-lang-client-0481875058 --non-interactive
