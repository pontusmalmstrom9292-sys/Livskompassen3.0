name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # Capacitor Android requires JDK 21 (capacitor.build.gradle JavaVersion.VERSION_21).
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm

    - name: Install JS dependencies
      run: npm ci --legacy-peer-deps

    # capacitor-cordova-android-plugins/ is gitignored — must regenerate before Gradle.
    - name: Capacitor sync (generate native plugin stubs)
      run: |
        mkdir -p dist
        if [ ! -f dist/index.html ]; then
          printf '%s\n' '<!doctype html><html><body>ci</body></html>' > dist/index.html
        fi
        node scripts/write_capacitor_config.mjs
        npx cap sync android

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Run Lint
      run: ./android/gradlew -p android lint

    - name: Build with Gradle
      run: ./android/gradlew -p android assembleDebug

    - name: Run Unit Tests
      run: ./android/gradlew -p android test
