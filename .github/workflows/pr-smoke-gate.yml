# PR gate — static smoke + typecheck before merge to main.
# Complements firebase-hosting-main.yml (manual deploy only).

name: PR smoke gate

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build functions
        run: cd functions && npm ci --legacy-peer-deps && npm run build

      - name: Install Playwright Chromium (e2e gate)
        run: npx playwright install chromium

      - name: Setup .env for e2e (offline from google-services.json)
        run: node scripts/setup_env_from_google_services.mjs

      - name: Smoke pre-deploy gate (YOLO static)
        run: npm run smoke:predeploy

      # Lint deferred: typescript-eslint crashar på typescript@7 (Cjs API saknas tills TS 7.1).
      # Behåll typecheck:core-strict + smoke:predeploy som gate.

      - name: Agents UI unit tests
        run: npm run test:agents-ui

      - name: Economy unit tests
        run: npm run test:economy

      - name: Unit test aggregator
        run: npm run test:unit

      - name: Typecheck core strict
        run: npm run typecheck:core-strict
