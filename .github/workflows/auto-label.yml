# Auto-labeling — märker PRs automatiskt baserat på vilka filer som ändrats.
# Hjälper Pontus att snabbt se vad en PR påverkar utan att läsa kod.
# Labels sätts automatiskt — ingen manuell märkning behövs.

name: Auto-label PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: auto-label-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Label PR by changed files
        uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true
