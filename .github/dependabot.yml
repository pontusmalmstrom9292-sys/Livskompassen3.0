version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Patch och minor-uppdateringar av dev-beroenden mergas automatiskt efter smoke-gate PASS.
    # Major-versioner kräver alltid manuell genomgång.
    groups:
      production-dependencies:
        dependency-type: production
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
  - package-ecosystem: npm
    directory: /functions
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # firebase-functions v7+ bryter v1 callables (functions.region, CallableContext).
    # Uppgradera endast manuellt efter PMIR + smoke:functions-pin + functions build.
    ignore:
      - dependency-name: firebase-functions
        update-types: [version-update:semver-major]
  # GitHub Actions — uppdatera actions automatiskt för säkerhetspatchar
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
