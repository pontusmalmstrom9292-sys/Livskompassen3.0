version: 2
# Säkerhetsnät · Lås 2 — gratis dependabot + auto-merge för patch.
# Auto-merge sker via .github/workflows/dependabot-auto-merge.yml och
# kräver att PR smoke gate är grön. Major och minor kräver alltid manuell
# granskning. Se docs/SAKERHETSNAT.md.
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Auto-merge: patch på alla beroenden, minor på dev-beroenden (smoke-PASS krävs).
    # Major-versioner kräver alltid manuell genomgång (Pontus OK).
    labels:
      - dependencies
      - säkerhetsnät
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - patch
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
  - package-ecosystem: npm
    directory: /functions
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - functions
      - säkerhetsnät
    # firebase-functions nu på v7 (v2-only API). Blockera semver-major för att förhindra
    # oavsiktlig uppgradering till v8+ utan PMIR + smoke:functions-pin + functions build.
    ignore:
      - dependency-name: firebase-functions
        update-types: [version-update:semver-major]
  # GitHub Actions — uppdatera actions automatiskt för säkerhetspatchar
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
      - säkerhetsnät

