<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redesign — PNG-förhandsvisning (A · B · C)</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #0a0e14; color: #e2e8f0; padding: 1.5rem; }
    h1 { font-size: 1.1rem; color: #d4af37; letter-spacing: 0.12em; text-transform: uppercase; }
    p { color: #94a3b8; font-size: 0.9rem; max-width: 40rem; line-height: 1.5; }
    section { margin: 2rem 0; }
    h2 { font-size: 0.95rem; margin-bottom: 0.75rem; }
    h2.a { color: #38bdf8; }
    h2.b { color: #d4af37; }
    h2.c { color: #2dd4bf; }
    img { width: 100%; max-width: 1200px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08); display: block; }
    .tip { background: #131820; padding: 1rem; border-radius: 8px; margin-bottom: 2rem; font-size: 0.85rem; }
    code { color: #38bdf8; }
  </style>
</head>
<body>
  <h1>Redesign — bilder (fungerar utan server)</h1>
  <div class="tip">
    Den här sidan visar <strong>PNG-bilder</strong> — dubbelklicka filen i Finder eller kör
    <code>npm run gallery:redesign</code> från projektroten för interaktiva mockups i webbläsaren.
  </div>

  <section>
    <h2>Översikt</h2>
    <img src="previews/redesign-gallery-index.png" alt="Galleri översikt" />
  </section>

  <section>
    <h2 class="a">Style A — Nordic Precision</h2>
    <img src="previews/style-a-mockups.png" alt="Style A mockups skärm 01-18" />
  </section>

  <section>
    <h2 class="b">Style B — Ember Sanctuary</h2>
    <img src="previews/style-b-mockups.png" alt="Style B mockups skärm 01-18" />
  </section>

  <section>
    <h2 class="c">Style C — Aurora Prism</h2>
    <img src="previews/style-c-mockups.png" alt="Style C mockups skärm 01-18" />
  </section>
</body>
</html>
