      <stop offset="0%" stop-color="#3d2e22"/>
      <stop offset="50%" stop-color="#141210"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <linearGradient id="p2g" x1="0" y1="0" x2="1" y2="1">
