<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Premium ikoner v2 — Livskompassen</title>
  <style>
    :root {
      --bg: #0c1816;
      --gold: #d4af37;
      --fire: #ffb74d;
      --text: #e8e6e3;
      --dim: #7a9a94;
      --glass: rgba(212, 175, 55, 0.1);
      --border: rgba(212, 175, 55, 0.45);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% 0%, #1e3a35 0%, #030606 55%);
      color: var(--text);
      padding: 2rem 1rem 4rem;
      min-height: 100vh;
    }
    h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.5rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
      text-shadow: 0 0 24px rgba(212, 175, 55, 0.35);
    }
    p.lead {
      text-align: center;
      color: var(--dim);
      max-width: 40rem;
      margin: 0.5rem auto 2rem;
      line-height: 1.5;
      font-size: 0.92rem;
    }
    p.lead strong { color: var(--fire); }
    section { max-width: 960px; margin: 0 auto 2.75rem; }
    h2 {
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--dim);
      border-bottom: 1px solid rgba(212, 175, 55, 0.15);
      padding-bottom: 0.5rem;
      margin-bottom: 1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.25rem;
    }
    figure {
      margin: 0;
      padding: 1.5rem 1.25rem;
      border-radius: 1.25rem;
      border: 1px solid rgba(212, 175, 55, 0.12);
      background: linear-gradient(165deg, rgba(30, 58, 53, 0.35) 0%, rgba(3, 6, 6, 0.9) 100%);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      text-align: center;
    }
    figure strong {
      display: block;
      color: var(--gold);
      margin-top: 1rem;
      font-size: 1.05rem;
      letter-spacing: 0.04em;
    }
    figure span { display: block; font-size: 0.8rem; color: var(--dim); margin-top: 0.35rem; line-height: 1.4; }
    .app-icon { width: 128px; height: 128px; border-radius: 28px; filter: drop-shadow(0 8px 24px rgba(212, 175, 55, 0.25)); }
    .mark { width: 56px; height: 56px; }
    .hero-ref {
      max-width: 280px;
      width: 100%;
      border-radius: 1rem;
      margin: 0 auto 2rem;
      display: block;
      border: 1px solid var(--border);
      opacity: 0.9;
    }
    .mock-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.65rem 0.85rem;
      margin-top: 1.1rem;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--glass);
      backdrop-filter: blur(8px);
    }
    .mock-logo {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 20px rgba(212, 175, 55, 0.08);
    }
    .mock-logo object { width: 40px; height: 40px; }
    .mock-title {
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      color: var(--gold);
      font-family: Georgia, serif;
    }
    .mock-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 16px rgba(255, 183, 77, 0.15);
    }
    .mock-avatar object { width: 32px; height: 32px; }
    .mock-dock { margin-top: 0.85rem; display: flex; justify-content: center; }
    .mock-plate {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: radial-gradient(circle at 50% 35%, rgba(212,175,55,0.2) 0%, rgba(10,10,10,0.95) 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 28px rgba(212, 175, 55, 0.2);
    }
    .mock-plate object { width: 32px; height: 32px; }
    .png-row { width: 100%; border-radius: 12px; margin-bottom: 1rem; }
    .tag {
      display: inline-block;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--fire);
      border: 1px solid rgba(255, 183, 77, 0.35);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      margin-bottom: 0.75rem;
    }
  </style>
</head>
<body>
  <h1>Premium v2</h1>
  <p class="lead">
    Som <strong>bakgrundskompassen</strong> på Hem — metall, sacred geometry, glödande nord.<br/>
    Välj <strong>B·D·M</strong> (t.ex. B1 · D3 · M2) och skriv <em>byt in</em>.
  </p>
  <img class="hero-ref" src="../../galleri/KOMPASS-LOCKED-kanon.png" alt="Referens hem-kompass" />

  <section>
    <h2>1 — Appikon</h2>
    <img class="png-row" src="previews/premium-app-row.png" alt="" onerror="this.style.display='none'" />
    <div class="grid">
      <figure>
        <span class="tag">B1</span>
        <img class="app-icon" src="app/B1-kanon-ros.svg" alt="" />
        <strong>B1 — Kanon ros</strong>
        <span>Teal + fyllig ros + stjärnglöd (som galleri)</span>
      </figure>
      <figure>
        <span class="tag">B2</span>
        <img class="app-icon" src="app/B2-aurora-ring.svg" alt="" />
        <strong>B2 — Aurora ring</strong>
        <span>Aurora-kant · nordisk lyx</span>
      </figure>
      <figure>
        <span class="tag">B3</span>
        <img class="app-icon" src="app/B3-stjarnfalt.svg" alt="" />
        <strong>B3 — Stjärnfält</strong>
        <span>Dubbel stjärnpolygon + rymd</span>
      </figure>
    </div>
  </section>

  <section>
    <h2>2 — Kompass (header + dock)</h2>
    <img class="png-row" src="previews/premium-kompass-row.png" alt="" onerror="this.style.display='none'" />
    <div class="grid">
      <figure>
        <span class="tag">D1</span>
        <object class="mark" type="image/svg+xml" data="kompass/D1-helros.svg"></object>
        <strong>D1 — Helros</strong>
        <span>Ringar · ticks · 8-spets · eldnål</span>
        <div class="mock-header">
          <div class="mock-logo"><object type="image/svg+xml" data="kompass/D1-helros.svg"></object></div>
          <span class="mock-title">LIVSKOMPASSEN</span>
          <div></div>
        </div>
        <div class="mock-dock"><div class="mock-plate"><object type="image/svg+xml" data="kompass/D1-helros.svg"></object></div></div>
      </figure>
      <figure>
        <span class="tag">D2</span>
        <object class="mark" type="image/svg+xml" data="kompass/D2-sacred.svg"></object>
        <strong>D2 — Sacred</strong>
        <span>Dubbel stjärnpolygon + hex-känsla</span>
        <div class="mock-header">
          <div class="mock-logo"><object type="image/svg+xml" data="kompass/D2-sacred.svg"></object></div>
          <span class="mock-title">LIVSKOMPASSEN</span>
          <div></div>
        </div>
        <div class="mock-dock"><div class="mock-plate"><object type="image/svg+xml" data="kompass/D2-sacred.svg"></object></div></div>
      </figure>
      <figure>
        <span class="tag">D3</span>
        <object class="mark" type="image/svg+xml" data="kompass/D3-eldnal.svg"></object>
        <strong>D3 — Eldnål</strong>
        <span>Max detalj · amber-nord · glödstjärna</span>
        <div class="mock-header">
          <div class="mock-logo"><object type="image/svg+xml" data="kompass/D3-eldnal.svg"></object></div>
          <span class="mock-title">LIVSKOMPASSEN</span>
          <div></div>
        </div>
        <div class="mock-dock"><div class="mock-plate"><object type="image/svg+xml" data="kompass/D3-eldnal.svg"></object></div></div>
      </figure>
    </div>
  </section>

  <section>
    <h2>3 — Kompis</h2>
    <img class="png-row" src="previews/premium-kompis-row.png" alt="" onerror="this.style.display='none'" />
    <div class="grid">
      <figure>
        <span class="tag">M1</span>
        <object class="mark" type="image/svg+xml" data="kompis/M1-stjarnkompis.svg"></object>
        <strong>M1 — Stjärnkompis</strong>
        <span>8-spets + eld — “Din eld”</span>
        <div class="mock-header">
          <div></div><span class="mock-title" style="opacity:0.4">mock</span>
          <div class="mock-avatar"><object type="image/svg+xml" data="kompis/M1-stjarnkompis.svg"></object></div>
        </div>
      </figure>
      <figure>
        <span class="tag">M2</span>
        <object class="mark" type="image/svg+xml" data="kompis/M2-orakeloga.svg"></object>
        <strong>M2 — Orakelöga</strong>
        <span>Kompassring + öga · vägleder</span>
        <div class="mock-header">
          <div></div><span class="mock-title" style="opacity:0.4">mock</span>
          <div class="mock-avatar"><object type="image/svg+xml" data="kompis/M2-orakeloga.svg"></object></div>
        </div>
      </figure>
      <figure>
        <span class="tag">M3</span>
        <object class="mark" type="image/svg+xml" data="kompis/M3-fyren-sjal.svg"></object>
        <strong>M3 — Fyrens själ</strong>
        <span>Ljuskegel · lugn navigator</span>
        <div class="mock-header">
          <div></div><span class="mock-title" style="opacity:0.4">mock</span>
          <div class="mock-avatar"><object type="image/svg+xml" data="kompis/M3-fyren-sjal.svg"></object></div>
        </div>
      </figure>
    </div>
  </section>
</body>
</html>
