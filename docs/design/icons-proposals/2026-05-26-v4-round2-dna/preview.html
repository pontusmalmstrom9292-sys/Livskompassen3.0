<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ikoner v4 — 10 stilar · round2 DNA</title>
  <style>
    :root { --gold:#d4af37; --fire:#ffb74d; --text:#e8e6e3; --dim:#7a9a94; --warn:#ffb74d; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(ellipse 120% 70% at 50% 0%, #1e3a35 0%, #030606 60%);
      color: var(--text); padding: 1.5rem 1rem 4rem;
    }
    h1 { text-align: center; font-size: 1.2rem; letter-spacing: .12em; text-transform: uppercase; color: var(--gold); }
    p.lead { text-align: center; max-width: 44rem; margin: .5rem auto 1rem; font-size: .88rem; line-height: 1.55; color: var(--dim); }
    p.lead strong { color: var(--fire); }
    .hero-compare {
      max-width: 720px; margin: 0 auto 2rem; padding: 1rem;
      border: 1px solid rgba(212,175,55,.25); border-radius: 16px;
      background: rgba(0,0,0,.35); text-align: center;
    }
    .hero-compare img { max-width: 100%; border-radius: 12px; }
    .hero-compare figcaption { font-size: .75rem; color: var(--dim); margin-top: .5rem; }
    .legend { display: flex; flex-wrap: wrap; justify-content: center; gap: .35rem .75rem; font-size: .68rem; color: var(--dim); margin-bottom: 1.5rem; }
    .legend b { color: var(--gold); font-weight: 600; }
    section { max-width: 1180px; margin: 0 auto 2rem; }
    h2 { font-size: .68rem; letter-spacing: .18em; text-transform: uppercase; color: var(--dim); border-bottom: 1px solid rgba(212,175,55,.2); padding-bottom: .35rem; margin-bottom: .65rem; }
    h2.core { color: var(--fire); border-color: rgba(255,183,77,.35); }
    .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: .55rem; }
    @media (max-width: 900px) { .row { grid-template-columns: repeat(2, 1fr); } }
    figure { margin: 0; padding: .65rem .4rem; text-align: center; border-radius: 12px; border: 1px solid rgba(212,175,55,.12); background: rgba(0,0,0,.3); }
    figure.app fig img { width: 72px; height: 72px; border-radius: 16px; }
    figure img { width: 56px; height: 56px; }
    figcaption { font-size: .62rem; color: var(--gold); margin-top: .35rem; }
    figcaption small { display: block; color: var(--dim); font-size: .55rem; margin-top: .12rem; word-break: break-all; }
    .badge { display: inline-block; font-size: .58rem; padding: .1rem .35rem; border-radius: 4px; margin-left: .2rem; }
    .badge-3d { background: rgba(255,183,77,.2); color: var(--fire); }
    .badge-flat { background: rgba(122,154,148,.2); color: var(--dim); }
  </style>
</head>
<body>
  <h1>Ikoner v4 — 10 stilar</h1>
  <p class="lead">
    <strong>Stil-DNA:</strong> v2 andra omgången — Eldnål-kompass (D3), Aurora-app (B2), Stjärnkompis (M1).
    Prod har idag B1/D1/M3 — denna batch är för <em>nytt val</em>.
    Jämför mot hem-kompassen nedan.
  </p>

  <figure class="hero-compare">
    <img src="../../galleri/KOMPASS-LOCKED-kanon.png" alt="Hem-kompass referens" width="320" />
    <figcaption>Referens — bakgrundskompassen på Hem (mål: samma detalj, inte platta Lucide)</figcaption>
  </figure>

  <div class="legend" id="legend"></div>

  <script>
    const STYLES = [
      ['1','Helros flat','flat'],['2','Helros 3D','3d'],['3','Eldnål flat','flat'],['4','Eldnål 3D','3d'],
      ['5','Aurora flat','flat'],['6','Aurora 3D','3d'],['7','Stjärn flat','flat'],['8','Stjärn 3D','3d'],
      ['9','Sacred oktagon','flat'],['10','Obsidian djup','3d']
    ];
    const legend = document.getElementById('legend');
    STYLES.forEach(([n,name,mode]) => {
      const s = document.createElement('span');
      s.innerHTML = `<b>${n}</b> ${name} <span class="badge badge-${mode}">${mode}</span>`;
      legend.appendChild(s);
    });

    function rowSection(title, base, files, isApp, isCore) {
      const sec = document.createElement('section');
      const h = document.createElement('h2');
      h.textContent = title;
      if (isCore) h.className = 'core';
      sec.appendChild(h);
      const row = document.createElement('div');
      row.className = 'row';
      files.forEach((fn, i) => {
        const fig = document.createElement('figure');
        if (isApp) fig.className = 'app';
        const img = document.createElement('img');
        img.src = `${base}/${fn}`;
        img.alt = fn;
        const cap = document.createElement('figcaption');
        const mode = STYLES[i][2];
        cap.innerHTML = `${i + 1} · ${STYLES[i][1]}<span class="badge badge-${mode}">${mode}</span><small>${fn}</small>`;
        fig.appendChild(img);
        fig.appendChild(cap);
        row.appendChild(fig);
      });
      sec.appendChild(row);
      document.body.appendChild(sec);
    }

    const styleSuffix = [
      'helros-flat','helros-3d','eldnal-flat','eldnal-3d','aurora-flat','aurora-3d',
      'stjarn-flat','stjarn-3d','sacred-flat','obsidian-3d'
    ];
    const mk = (prefix) => styleSuffix.map((s, i) => `${prefix}${i + 1}-${s}.svg`);

    rowSection('Appikon (Android / PWA) — 10 varianter', 'core/app', mk('B'), true, true);
    rowSection('Kompass (header + dock) — 10 varianter', 'core/kompass', mk('D'), false, true);
    rowSection('Kompis (avatar) — 10 varianter', 'core/kompis', mk('M'), false, true);

    const cats = [
      ['Familjen', 'familjen', 'F'], ['Hamn', 'hamn', 'H'], ['Valv', 'valv', 'V'],
      ['Dagbok', 'dagbok', 'J'], ['Planering', 'planering', 'P'], ['MåBra', 'mabra', 'A'],
      ['Hero Rutiner', 'hero/rutiner', 'R'], ['Hero Ekonomi', 'hero/ekonomi', 'E'],
      ['Hero Utveckling', 'hero/utveckling', 'U'], ['Hero Kunskap', 'hero/kunskap', 'Kn']
    ];
    for (const [title, base, prefix] of cats) {
      rowSection(title, base, mk(prefix), false, false);
    }
  </script>
</body>
</html>
