<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Livskompassen — ikonförslag 2026-05-26</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --gold: #d4af37;
      --text: #e8e6e3;
      --dim: #8a8680;
      --glass: rgba(212, 175, 55, 0.12);
      --border: rgba(212, 175, 55, 0.38);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 2rem 1.25rem 4rem;
    }
    h1 {
      font-family: Outfit, Inter, sans-serif;
      font-size: 1.35rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
    }
    p.lead { text-align: center; color: var(--dim); max-width: 36rem; margin: 0.5rem auto 2rem; font-size: 0.95rem; }
    section { max-width: 920px; margin: 0 auto 2.5rem; }
    h2 {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding-bottom: 0.5rem;
      margin-bottom: 1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }
    figure {
      margin: 0;
      padding: 1.25rem;
      border-radius: 1rem;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      text-align: center;
    }
    figure strong { display: block; color: var(--gold); margin-top: 0.75rem; font-size: 1rem; }
    figure span { display: block; font-size: 0.8rem; color: var(--dim); margin-top: 0.25rem; }
    .app-icon { width: 120px; height: 120px; border-radius: 26px; }
    .mark { width: 48px; height: 48px; color: var(--gold); }
    .mock-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.75rem 1rem;
      margin-top: 1rem;
      border-radius: 1rem;
      border: 1px solid var(--border);
      background: var(--glass);
    }
    .mock-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--glass);
    }
    .mock-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--glass);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mock-avatar img, .mock-avatar object { width: 24px; height: 24px; color: var(--gold); }
    .mock-dock {
      margin-top: 1rem;
      display: flex;
      justify-content: center;
    }
    .mock-plate {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(212,175,55,0.15);
    }
    .mock-plate img { width: 28px; height: 28px; color: var(--gold); }
    object { pointer-events: none; }
  </style>
</head>
<body>
  <h1>Ikonförslag</h1>
  <p class="lead">Välj ett ID per rad (t.ex. <strong>A2 · C1 · K3</strong>). Säg till i Cursor — då byter vi in i appen.</p>

  <section>
    <h2>1 — Appikon (hemskärm)</h2>
    <div class="grid">
      <figure>
        <img class="app-icon" src="app/A1-istone.svg" alt="A1 I-stone" />
        <strong>A1 — I-stone</strong>
        <span>Obsidian + 4-spets ros</span>
      </figure>
      <figure>
        <img class="app-icon" src="app/A2-pansar.svg" alt="A2 Pansar" />
        <strong>A2 — Pansar</strong>
        <span>Dubbel ring + nord</span>
      </figure>
      <figure>
        <img class="app-icon" src="app/A3-fyren.svg" alt="A3 Fyren" />
        <strong>A3 — Fyren</strong>
        <span>Ljusstråle + bas</span>
      </figure>
    </div>
  </section>

  <section>
    <h2>2 — Kompass (header + dock)</h2>
    <div class="grid">
      <figure>
        <object class="mark" type="image/svg+xml" data="kompass/C1-nordsten.svg">C1</object>
        <strong>C1 — Nordsten</strong>
        <span>Minimalt — minst brus</span>
        <div class="mock-header">
          <div class="mock-logo"><object class="mark" type="image/svg+xml" data="kompass/C1-nordsten.svg"></object></div>
          <span style="font-size:0.7rem;letter-spacing:0.12em;color:var(--gold)">LIVSKOMPASSEN</span>
          <div></div>
        </div>
        <div class="mock-dock"><div class="mock-plate"><object type="image/svg+xml" data="kompass/C1-nordsten.svg" style="width:28px;height:28px"></object></div></div>
      </figure>
      <figure>
        <object class="mark" type="image/svg+xml" data="kompass/C2-oktagon.svg">C2</object>
        <strong>C2 — Oktagon</strong>
        <span>8 riktningar, arkitektonisk</span>
        <div class="mock-header">
          <div class="mock-logo"><object class="mark" type="image/svg+xml" data="kompass/C2-oktagon.svg"></object></div>
          <span style="font-size:0.7rem;letter-spacing:0.12em;color:var(--gold)">LIVSKOMPASSEN</span>
          <div></div>
        </div>
        <div class="mock-dock"><div class="mock-plate"><object type="image/svg+xml" data="kompass/C2-oktagon.svg" style="width:28px;height:28px"></object></div></div>
      </figure>
      <figure>
        <object class="mark" type="image/svg+xml" data="kompass/C3-lagring.svg">C3</object>
        <strong>C3 — Lagring</strong>
        <span>Bågar + nord — arkiv</span>
        <div class="mock-header">
          <div class="mock-logo"><object class="mark" type="image/svg+xml" data="kompass/C3-lagring.svg"></object></div>
          <span style="font-size:0.7rem;letter-spacing:0.12em;color:var(--gold)">LIVSKOMPASSEN</span>
          <div></div>
        </div>
        <div class="mock-dock"><div class="mock-plate"><object type="image/svg+xml" data="kompass/C3-lagring.svg" style="width:28px;height:28px"></object></div></div>
      </figure>
    </div>
  </section>

  <section>
    <h2>3 — Kompis (header höger)</h2>
    <div class="grid">
      <figure>
        <object class="mark" type="image/svg+xml" data="kompis/K1-oga.svg">K1</object>
        <strong>K1 — Öga</strong>
        <span>Närvaro / lyssnar</span>
        <div class="mock-header">
          <div></div><span style="font-size:0.65rem;color:var(--dim)">mock</span>
          <div class="mock-avatar"><object type="image/svg+xml" data="kompis/K1-oga.svg" style="width:24px;height:24px"></object></div>
        </div>
      </figure>
      <figure>
        <object class="mark" type="image/svg+xml" data="kompis/K2-puls.svg">K2</object>
        <strong>K2 — Puls</strong>
        <span>Analyserar — lugn kurva</span>
        <div class="mock-header">
          <div></div><span style="font-size:0.65rem;color:var(--dim)">mock</span>
          <div class="mock-avatar"><object type="image/svg+xml" data="kompis/K2-puls.svg" style="width:24px;height:24px"></object></div>
        </div>
      </figure>
      <figure>
        <object class="mark" type="image/svg+xml" data="kompis/K3-skoldpunkt.svg">K3</object>
        <strong>K3 — Sköldpunkt</strong>
        <span>Kognitiv sköld</span>
        <div class="mock-header">
          <div></div><span style="font-size:0.65rem;color:var(--dim)">mock</span>
          <div class="mock-avatar"><object type="image/svg+xml" data="kompis/K3-skoldpunkt.svg" style="width:24px;height:24px"></object></div>
        </div>
      </figure>
    </div>
  </section>
</body>
</html>
