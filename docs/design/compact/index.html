<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kompakt tema — modul för modul</title>
  <style>
    :root { --gold: #d4af37; --bg: #0a1218; --cream: #f5f0e8; --muted: #a8a29e; }
    body { margin: 0; font-family: Inter, system-ui; background: var(--bg); color: var(--cream); }
    header { padding: 2rem 1.5rem; text-align: center; border-bottom: 1px solid rgba(212,175,55,0.2); }
    h1 { color: var(--gold); margin: 0 0 0.5rem; font-size: 1.4rem; }
    header p { color: var(--muted); max-width: 40rem; margin: 0 auto; font-size: 0.9rem; line-height: 1.6; }
    .ref { max-width: 280px; margin: 1.5rem auto; border: 1px solid rgba(212,175,55,0.3); border-radius: 0.75rem; overflow: hidden; }
    .ref img { width: 100%; display: block; }
    .ref figcaption { padding: 0.5rem; font-size: 0.75rem; color: var(--muted); text-align: center; }
    section { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
    h2 { color: var(--gold); font-size: 1.05rem; margin: 2rem 0 0.75rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    figure { margin: 0; background: rgba(18,21,31,0.5); border: 1px solid rgba(212,175,55,0.2); border-radius: 0.75rem; overflow: hidden; }
    figure img { width: 100%; display: block; cursor: zoom-in; }
    figcaption { padding: 0.6rem 0.75rem; font-size: 0.78rem; color: var(--muted); }
    figcaption strong { color: var(--gold); display: block; }
    a { color: var(--gold); }
    dialog { border: none; background: transparent; max-width: 95vw; }
    dialog img { max-height: 92vh; border-radius: 0.5rem; }
    dialog::backdrop { background: rgba(0,0,0,0.92); }
  </style>
</head>
<body>
  <header>
    <h1>Kompakt Livskompassen</h1>
    <p>Samma tema som din referens: <strong>bakgrund + kompass låsta</strong>. Alla bilder är <strong>telefon (portrait)</strong>. Kod: guldlinjer <strong>2px</strong> (fylligare). Klicka för zoom.</p>
    <figure class="ref">
      <img src="../references/LIVSKOMPASSEN-hem-kompakt-ref.png" alt="Din referens" />
      <figcaption>Din referens — oförändrad känsla</figcaption>
    </figure>
  </header>

  <section>
    <h2>00 — Hem (kompakt)</h2>
    <div class="grid">
      <figure><img src="modules/00-hem-kompakt.png" alt="" /><figcaption><strong>00 Hem</strong>Tätare kort, samma kompass &amp; sjö</figcaption></figure>
    </div>

    <h2>08 — Sidomeny (LÅST — din bild)</h2>
    <div class="grid">
      <figure style="grid-column:1/-1;max-width:360px;margin:0 auto;">
        <img src="modules/08-meny-drawer-kanon.png" alt="" />
        <figcaption><strong>08 Meny</strong>Hem · Familjen · Hamn · Valv · Planering · MåBra · Inställningar</figcaption>
      </figure>
    </div>

    <h2>01–07 Moduler</h2>
    <div class="grid">
      <figure><img src="modules/01-hamn-hub-kanon.png" alt="" /><figcaption><strong>01 Hamn · KANON</strong>Flikar, kompassråd, laddning 1–5</figcaption></figure>
      <figure><img src="modules/02-kompis-kanon.png" alt="" /><figcaption><strong>02 Kompis · KANON</strong>DIN AI-LIVSARKITEKT</figcaption></figure>
      <figure><img src="modules/03-valv-pansaret-kanon.png" alt="" /><figcaption><strong>03 Valv · KANON</strong>WORM-lista, frekvens</figcaption></figure>
      <figure><img src="modules/04-familjen.png" alt="" /><figcaption><strong>04 Familjen</strong>Barn, middag</figcaption></figure>
      <figure><img src="modules/05-planering-kanon.png" alt="" /><figcaption><strong>05 Planering P1</strong>Flikar inkorg · kalender</figcaption></figure>
      <figure><img src="modules/05-planering-p3-kanban-kanon.png" alt="" /><figcaption><strong>05b Kanban · KANON</strong>Att göra · Väntar · Klart + Fokus-nav</figcaption></figure>
      <figure><img src="modules/06-mabra-kanon.png" alt="" /><figcaption><strong>06 Transformatorn · KANON</strong>3 kort + TRANSFORMERA</figcaption></figure>
      <figure><img src="modules/07-barnporten-kanon.png" alt="" /><figcaption><strong>07 Barnporten · KANON</strong>2×2 — barnlogg ny design</figcaption></figure>
    </div>

    <p style="margin-top:2rem;color:var(--muted);font-size:0.85rem">
      Spec: <a href="COMPACT-THEME-SPEC.md">COMPACT-THEME-SPEC.md</a> ·
      <a href="../galleri/index.html">Huvudgalleri</a>
    </p>
  </section>

  <dialog id="lb"><img id="lb-img" alt="" /></dialog>
  <script>
    const lb = document.getElementById('lb');
    const lbImg = document.getElementById('lb-img');
    document.querySelectorAll('figure img').forEach((img) => {
      img.addEventListener('click', () => { lbImg.src = img.src; lb.showModal(); });
    });
    lb.addEventListener('click', (e) => { if (e.target === lb) lb.close(); });
  </script>
</body>
</html>
