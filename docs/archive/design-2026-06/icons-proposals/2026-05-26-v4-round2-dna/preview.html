<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ikoner v4 — B1 · D1 · M2 ankare</title>
  <style>
    :root { --gold:#d4af37; --fire:#ffb74d; --text:#e8e6e3; --dim:#7a9a94; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(ellipse 120% 70% at 50% 0%, #1e3a35 0%, #030606 60%);
      color: var(--text); padding: 1.5rem 1rem 4rem;
    }
    h1 { text-align: center; font-size: 1.2rem; letter-spacing: .12em; text-transform: uppercase; color: var(--gold); }
    p.lead { text-align: center; max-width: 44rem; margin: .5rem auto 1.5rem; font-size: .88rem; line-height: 1.55; color: var(--dim); }
    p.lead strong { color: var(--fire); }
    .refs { max-width: 960px; margin: 0 auto 2rem; display: grid; gap: 1rem; }
    .refs figure { margin: 0; padding: .75rem; border: 1px solid rgba(212,175,55,.25); border-radius: 12px; background: rgba(0,0,0,.35); text-align: center; }
    .refs img { max-width: 100%; border-radius: 8px; }
    .refs figcaption { font-size: .72rem; color: var(--dim); margin-top: .5rem; }
    .legend { display: flex; flex-wrap: wrap; justify-content: center; gap: .35rem .75rem; font-size: .68rem; color: var(--dim); margin-bottom: 1.5rem; }
    .legend b { color: var(--gold); }
    section { max-width: 1180px; margin: 0 auto 2rem; }
    h2 { font-size: .68rem; letter-spacing: .18em; text-transform: uppercase; color: var(--dim); border-bottom: 1px solid rgba(212,175,55,.2); padding-bottom: .35rem; margin-bottom: .65rem; }
    h2.core { color: var(--fire); border-color: rgba(255,183,77,.35); }
    .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: .55rem; }
    @media (max-width: 900px) { .row { grid-template-columns: repeat(2, 1fr); } }
    figure.cell { margin: 0; padding: .65rem .4rem; text-align: center; border-radius: 12px; border: 1px solid rgba(212,175,55,.12); background: rgba(0,0,0,.3); }
    figure.cell.app img { width: 72px; height: 72px; border-radius: 16px; }
    figure.cell img { width: 56px; height: 56px; }
    figcaption { font-size: .62rem; color: var(--gold); margin-top: .35rem; }
    figcaption small { display: block; color: var(--dim); font-size: .55rem; margin-top: .12rem; word-break: break-all; }
    .badge { display: inline-block; font-size: .58rem; padding: .1rem .35rem; border-radius: 4px; margin-left: .2rem; }
    .badge-3d { background: rgba(255,183,77,.2); color: var(--fire); }
    .badge-flat { background: rgba(122,154,148,.2); color: var(--dim); }
    .badge-anchor { background: rgba(212,175,55,.25); color: var(--gold); }
  </style>
</head>
<body>
  <h1>Ikoner v4</h1>
  <p class="lead">
    <strong>Kärn rad 1:</strong> B1 · D1 · M2 (v2-premium).
    <strong>Chrome:</strong> D1-skiva + egen symbol (familj, hamn, valv …) — 10 stilar, inte samma kompass.
  </p>

  <div class="refs">
    <figure><img src="reference/reference-app-b1-b2-b3.png" alt="B1 B2 B3 referens" /><figcaption>Mål app — B1 (vänster)</figcaption></figure>
    <figure><img src="reference/reference-kompass-d1-d2-d3.png" alt="D1 D2 D3 referens" /><figcaption>Mål kompass — D1 (vänster)</figcaption></figure>
    <figure><img src="reference/reference-kompis-m1-m2-m3.png" alt="M1 M2 M3 referens" /><figcaption>Referensrad M1·M2·M3 — prod <strong>M2</strong> Orakelöga</figcaption></figure>
  </div>

  <div class="legend" id="legend"></div>

  <script>
    const ROWS = [
      { n: '1', label: 'B1 / D1 / M2 (v2-premium)', mode: 'anchor' },
      { n: '2', label: 'Helros 3D', mode: '3d' },
      { n: '3', label: 'Eldnål flat', mode: 'flat' },
      { n: '4', label: 'Eldnål 3D', mode: '3d' },
      { n: '5', label: 'Aurora flat', mode: 'flat' },
      { n: '6', label: 'Aurora 3D', mode: '3d' },
      { n: '7', label: 'Stjärn flat', mode: 'flat' },
      { n: '8', label: 'Stjärn 3D', mode: '3d' },
      { n: '9', label: 'Sacred oktagon', mode: 'flat' },
      { n: '10', label: 'Obsidian djup', mode: '3d' },
    ];

    const CORE_SLUGS = {
      B: ['b1-kanon-ros-v2','helros-3d','eldnal-flat','eldnal-3d','aurora-flat','aurora-3d','stjarn-flat','stjarn-3d','sacred-flat','obsidian-3d'],
      D: ['d1-helros-v2','helros-3d','eldnal-flat','eldnal-3d','aurora-flat','aurora-3d','stjarn-flat','stjarn-3d','sacred-flat','obsidian-3d'],
      M: ['m2-orakel-v2','helros-3d','eldnal-flat','eldnal-3d','aurora-flat','aurora-3d','stjarn-flat','stjarn-3d','sacred-flat','obsidian-3d'],
    };
    const CHROME_SLUGS = ['d1-helros-chrome','helros-3d','eldnal-flat','eldnal-3d','aurora-flat','aurora-3d','stjarn-flat','stjarn-3d','sacred-flat','obsidian-3d'];

    const legend = document.getElementById('legend');
    ROWS.forEach((r) => {
      const s = document.createElement('span');
      const badge = r.mode === 'anchor' ? 'anchor' : r.mode;
      s.innerHTML = `<b>${r.n}</b> ${r.label} <span class="badge badge-${badge}">${r.mode === 'anchor' ? 'v2' : r.mode}</span>`;
      legend.appendChild(s);
    });

    function rowSection(title, base, prefix, isApp, isCore) {
      const sec = document.createElement('section');
      const h = document.createElement('h2');
      h.textContent = title;
      if (isCore) h.className = 'core';
      sec.appendChild(h);
      const row = document.createElement('div');
      row.className = 'row';
      const slugs = prefix === 'F' || prefix === 'H' || prefix === 'V' || prefix === 'J' || prefix === 'P' || prefix === 'A' || prefix === 'R' || prefix === 'E' || prefix === 'U' || prefix === 'Kn'
        ? CHROME_SLUGS
        : CORE_SLUGS[prefix];
      slugs.forEach((slug, i) => {
        const fn = `${prefix}${i + 1}-${slug}.svg`;
        const fig = document.createElement('figure');
        fig.className = 'cell';
        if (isApp) fig.classList.add('app');
        const img = document.createElement('img');
        img.src = `${base}/${fn}`;
        img.alt = fn;
        const cap = document.createElement('figcaption');
        const r = ROWS[i];
        cap.innerHTML = `${r.n} · ${r.label}<span class="badge badge-${r.mode === 'anchor' ? 'anchor' : r.mode}">${r.mode === 'anchor' ? 'v2' : r.mode}</span><small>${fn}</small>`;
        fig.appendChild(img);
        fig.appendChild(cap);
        row.appendChild(fig);
      });
      sec.appendChild(row);
      document.body.appendChild(sec);
    }

    rowSection('Appikon (Android / PWA)', 'core/app', 'B', true, true);
    rowSection('Kompass (header + dock)', 'core/kompass', 'D', false, true);
    rowSection('Kompis (avatar)', 'core/kompis', 'M', false, true);

    const cats = [
      ['Familjen', 'familjen', 'F'], ['Hamn', 'hamn', 'H'], ['Valv', 'valv', 'V'],
      ['Dagbok', 'dagbok', 'J'], ['Planering', 'planering', 'P'], ['MåBra', 'mabra', 'A'],
      ['Hero Rutiner', 'hero/rutiner', 'R'], ['Hero Ekonomi', 'hero/ekonomi', 'E'],
      ['Hero Utveckling', 'hero/utveckling', 'U'], ['Hero Kunskap', 'hero/kunskap', 'Kn'],
    ];
    for (const [title, base, prefix] of cats) {
      rowSection(title, base, prefix, false, false);
    }
  </script>
</body>
</html>
