# PR quality gate — smoke + build, no deploy (våg 3 CI).
# Setup: docs/CI-HOSTING.md

name: Quality gate (PR)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-hosting-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality_gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build functions
        run: cd functions && npm ci && npm run build

      - name: Smoke pre-deploy gate (YOLO static)
        run: npm run smoke:predeploy

      - name: Typecheck core strict
        run: npm run typecheck:core-strict

      - name: Build frontend
        run: npm run build
        env:
          # AUTH-G1: authDomain ska vara *.firebaseapp.com — lägg ALDRIG VITE_GOOGLE_SIGNIN_REDIRECT här.
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_APP_CHECK_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_APP_CHECK_RECAPTCHA_SITE_KEY }}
