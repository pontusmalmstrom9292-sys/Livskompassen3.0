apply plugin: 'com.android.application'

def readAppCheckDebugToken() {
    def fromEnv = System.getenv("VITE_APP_CHECK_DEBUG_TOKEN")
    if (fromEnv != null && !fromEnv.trim().isEmpty()) {
        return fromEnv.trim().replaceAll('^"|"$', '')
    }
    def envFile = rootProject.file("../.env")
    if (!envFile.exists()) {
        return ""
    }
    for (line in envFile.readLines()) {
        def trimmed = line.trim()
        if (trimmed.startsWith("VITE_APP_CHECK_DEBUG_TOKEN=")) {
            def value = trimmed.substring("VITE_APP_CHECK_DEBUG_TOKEN=".length()).trim()
            if (value.startsWith('"') && value.endsWith('"')) {
                value = value.substring(1, value.length() - 1)
            }
            return value
        }
    }
    return ""
}

def readLocalOrEnv(String key) {
    def fromEnv = System.getenv(key)
    if (fromEnv != null && !fromEnv.trim().isEmpty()) {
        return fromEnv.trim()
    }
    def candidates = [
        rootProject.file("local.properties"),
        rootProject.file("../local.properties"),
        project.file("local.properties")
    ]
    for (File f : candidates) {
        if (!f.exists()) continue
        for (line in f.readLines()) {
            def trimmed = line.trim()
            if (trimmed.startsWith(key + "=")) {
                return trimmed.substring((key + "=").length()).trim()
            }
        }
    }
    return ""
}

def appCheckDebugToken = readAppCheckDebugToken()
// SHA-256 Base64 of default Android debug cert (Signature.toByteArray / exportcert).
// Machine-local debug keystores may differ — override via LK_DEBUG_SIGNATURE_SHA256 if needed.
def debugSignatureSha256 = readLocalOrEnv("LK_DEBUG_SIGNATURE_SHA256")
if (debugSignatureSha256.isEmpty()) {
    debugSignatureSha256 = "2xG2ZmBEGrZiBaf/P5+4DrSX9gPtuDZdHe742pLhyug="
}
def releaseSignatureSha256 = readLocalOrEnv("LK_RELEASE_SIGNATURE_SHA256")

android {
    namespace = "com.livskompassen.app"
    compileSdk = 36 // Final release baseline
    
    buildFeatures {
        buildConfig = true
    }
    
    defaultConfig {
        applicationId = "com.livskompassen.app"
        minSdk = 26
        targetSdk = 36
        versionCode 1
        versionName "1.0-titanium"
        testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
        
        aaptOptions {
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    buildTypes {
        debug {
            buildConfigField "String", "FIREBASE_APP_CHECK_DEBUG_TOKEN", "\"${appCheckDebugToken}\""
            def debugAllow = debugSignatureSha256
            if (!releaseSignatureSha256.isEmpty()) {
                debugAllow = debugSignatureSha256 + "," + releaseSignatureSha256
            }
            buildConfigField "String", "ALLOWED_SIGNATURE_SHA256", "\"${debugAllow}\""
            buildConfigField "boolean", "SIGNATURE_PINNED", "true"
        }
        release {
            minifyEnabled true // Enable for release
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            buildConfigField "String", "FIREBASE_APP_CHECK_DEBUG_TOKEN", '""'
            buildConfigField "String", "ALLOWED_SIGNATURE_SHA256", "\"${releaseSignatureSha256}\""
            buildConfigField "boolean", "SIGNATURE_PINNED", "${!releaseSignatureSha256.isEmpty()}"
        }
    }

    lint {
        baseline = file("lint-baseline.xml")
        abortOnError = true
    }
}

