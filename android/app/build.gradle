apply plugin: 'com.android.application'

def readAppCheckDebugToken() {
    def fromEnv = System.getenv("VITE_APP_CHECK_DEBUG_TOKEN")
    if (fromEnv != null && !fromEnv.trim().isEmpty()) {
        return fromEnv.trim().replaceAll('^"|"$', '')
    }
    def envFile = rootProject.file("../.env")
    if (!envFile.exists()) {
        return ""
    }
    for (line in envFile.readLines()) {
        def trimmed = line.trim()
        if (trimmed.startsWith("VITE_APP_CHECK_DEBUG_TOKEN=")) {
            def value = trimmed.substring("VITE_APP_CHECK_DEBUG_TOKEN=".length()).trim()
            if (value.startsWith('"') && value.endsWith('"')) {
                value = value.substring(1, value.length() - 1)
            }
            return value
        }
    }
    return ""
}

def appCheckDebugToken = readAppCheckDebugToken()

android {
    namespace = "com.livskompassen.app"
    compileSdk = rootProject.ext.compileSdkVersion
    buildFeatures {
        buildConfig = true
    }
    defaultConfig {
        applicationId = "com.livskompassen.app"
        minSdk = rootProject.ext.minSdkVersion
        // targetSdk 35 är ett balanserat val för stabilitet och moderna funktioner
        targetSdk = rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        debug {
            buildConfigField "String", "FIREBASE_APP_CHECK_DEBUG_TOKEN", "\"${appCheckDebugToken}\""
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            buildConfigField "String", "FIREBASE_APP_CHECK_DEBUG_TOKEN", '""'
        }
    }
}

// Security Verification Task - Fails build if critical security components are missing
tasks.register("verifySecurityComponents") {
    doLast {
        def criticalFiles = [
            "src/main/java/com/livskompassen/app/core/SacredLockManager.java",
            "src/main/java/com/livskompassen/app/core/WebViewManager.java",
            "src/main/res/xml/network_security_config.xml"
        ]
        criticalFiles.each { filePath ->
            def file = project.file(filePath)
            if (!file.exists()) {
                throw new GradleException("CRITICAL SECURITY COMPONENT MISSING: ${filePath}. Build aborted for safety.")
            }
        }
        println("Security components verified successfully.")
    }
}

// Run verification before assembling
tasks.named("preBuild") {
    dependsOn("verifySecurityComponents")
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation libs.androidx.appcompat
    implementation libs.androidx.activity
    implementation libs.androidx.coordinatorlayout
    implementation libs.androidx.splashscreen
    implementation libs.androidx.biometric
    implementation libs.androidx.security
    implementation project(':capacitor-android')
    testImplementation libs.junit
    androidTestImplementation libs.androidx.junit
    androidTestImplementation libs.espresso.core
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception ignored) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
