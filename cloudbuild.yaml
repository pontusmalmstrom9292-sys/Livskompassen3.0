# Livskompassen v2 — Cloud Build → Firebase (hosting + rules + modul-Functions)
#
# Projekt: gen-lang-client-0481875058 (samma som .firebaserc)
# Manuell körning:
#   gcloud builds submit --config=cloudbuild.yaml --project=gen-lang-client-0481875058 .
#
# Kräver Secret Manager-secrets för VITE_FIREBASE_* (se docs/DEPLOY.md § Cloud Build).
# notifyNewFile ingår INTE (kräver NOTIFY_WEBHOOK_SECRET satt manuellt).

substitutions:
  _FIREBASE_PROJECT: gen-lang-client-0481875058
  _DEPLOY_ONLY: hosting,firestore:rules,firestore:indexes,storage,functions:analyzeMessage,functions:invalidateSession,functions:generateEmbedding,functions:ingestKampsparEntry,functions:knowledgeVaultQuery,functions:valvChatQuery,functions:childrenLogsQuery,functions:getEntityProfileRegistry,functions:getInboxQueue,functions:confirmInboxItem,functions:dismissInboxItem,functions:previewInboxClassification,functions:getContextCacheStatus,functions:scheduledRetentionJob,functions:weaveJournalEntry,functions:journalWovenToKampspar,functions:speglingsMirror,functions:mabraCoach,functions:generateDossier,functions:breakDownResponse,functions:getAgentRegistry,functions:generatePayslip,functions:scheduledGeneratePayslip

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 2400s

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/VITE_FIREBASE_API_KEY/versions/latest
      env: VITE_FIREBASE_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/VITE_FIREBASE_AUTH_DOMAIN/versions/latest
      env: VITE_FIREBASE_AUTH_DOMAIN
    - versionName: projects/$PROJECT_ID/secrets/VITE_FIREBASE_PROJECT_ID/versions/latest
      env: VITE_FIREBASE_PROJECT_ID
    - versionName: projects/$PROJECT_ID/secrets/VITE_FIREBASE_STORAGE_BUCKET/versions/latest
      env: VITE_FIREBASE_STORAGE_BUCKET
    - versionName: projects/$PROJECT_ID/secrets/VITE_FIREBASE_MESSAGING_SENDER_ID/versions/latest
      env: VITE_FIREBASE_MESSAGING_SENDER_ID
    - versionName: projects/$PROJECT_ID/secrets/VITE_FIREBASE_APP_ID/versions/latest
      env: VITE_FIREBASE_APP_ID

steps:
  - id: npm-ci-root
    name: node:20
    entrypoint: npm
    args: ["ci"]

  - id: npm-ci-functions
    name: node:20
    dir: functions
    entrypoint: npm
    args: ["ci"]

  - id: build-functions
    name: node:20
    dir: functions
    entrypoint: npm
    args: ["run", "build"]
    waitFor: ["npm-ci-functions"]

  - id: build-hosting
    name: node:20
    entrypoint: npm
    args: ["run", "build"]
    waitFor: ["npm-ci-root"]
    secretEnv:
      - VITE_FIREBASE_API_KEY
      - VITE_FIREBASE_AUTH_DOMAIN
      - VITE_FIREBASE_PROJECT_ID
      - VITE_FIREBASE_STORAGE_BUCKET
      - VITE_FIREBASE_MESSAGING_SENDER_ID
      - VITE_FIREBASE_APP_ID

  - id: firebase-deploy
    name: us-docker.pkg.dev/firebase-cli/us/firebase
    args:
      - deploy
      - --project=${_FIREBASE_PROJECT}
      - --only=${_DEPLOY_ONLY}
      - --non-interactive
      - --force
    waitFor: ["build-functions", "build-hosting"]
