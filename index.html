    <meta name="mobile-web-app-capable" content="yes" />

    <title>Livskompassen v2</title>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <script>
      (function () {
        var ua = navigator.userAgent || '';
        var cap = window.Capacitor;
        var native =
          cap &&
          (typeof cap.isNativePlatform === 'function'
            ? cap.isNativePlatform()
            : cap.getPlatform && cap.getPlatform() !== 'web');
        var capAndroid = native && cap.getPlatform && cap.getPlatform() === 'android';
        var localhostAndroid =
          /Android/i.test(ua) && /^https:\/\/localhost$/i.test(window.location.origin);
        if (capAndroid || localhostAndroid) {
          document.documentElement.classList.add('platform-capacitor-android');
        }
      })();
    </script>
    <div id="root">
      <div
        style="
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #050b14;
          color: #94a3b8;
          font-family: Inter, system-ui, sans-serif;
          font-size: 0.95rem;
        "
      >
        Laddar Livskompassen…
      </div>
    </div>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
